# workers-rs-util -- extra Rust crates for Cloudflare workers-rs, plus the
# nushell plugins that build on the cloudflare-shell FS abstraction.
#
# Task namespaces:
#   plugins:build/test   -- the nushell plugins (host)
#   cf:fs:*              -- cloudflare-shell-rpc: the FS-as-a-service Worker
#                           (build/dev/deploy + local pitchfork smoke + bench)
#   email:worker:*       -- cf_email_worker build/check/dev/deploy

[settings]
experimental = true

[task_config]
# Shared TOML task library from joeblew999/.github (provides cf:token-check,
# ci:_base, etc. that the deploy tasks below depend on).
includes = [
  "git::https://github.com/joeblew999/.github.git//tasks/mise.toml?ref=v0.58.0",
  "git::https://github.com/joeblew999/.github.git//tasks/ci.toml?ref=v0.58.0",
  "git::https://github.com/joeblew999/.github.git//tasks/tool-rust.toml?ref=v0.58.0",
  "git::https://github.com/joeblew999/.github.git//tasks/tool-cf.toml?ref=v0.58.0",
  "git::https://github.com/joeblew999/.github.git//tasks/tool-wrangler.toml?ref=v0.58.0",
]

[tools]
# Repo-specific tools only. Rust -> rust-toolchain.toml (rustup); fnox/gh/jq/...
# come from the global config via `mise run mise:global:bootstrap` (CI runs it
# too). nushell IS pinned here as a per-repo override (beats global `latest`):
# the nu_plugin_* crates link nu-plugin 0.113.1, so the standalone nu must match.
"github:nushell/nushell" = "0.113"

[env]
CARGO_TERM_COLOR = "always"
# CI: which OS runners the reusable workflow fans out to (read by
# `mise run mise:repo:bootstrap` -> .github/workflows/mise.yml).
CI_OS_MATRIX = '["ubuntu-latest", "macos-latest", "windows-latest"]'

# CI pipeline: `mise run ci` (local AND on the matrix). MERGES with the shared
# ci (ci:check-global + ci:check-nu from tasks/ci.toml). Native plugin build+test
# only -- the wasm/wrangler tasks need extra targets/daemons, run separately.
[tasks.ci]
depends = ["plugins:build", "plugins:test"]

# ============================================================================
# plugin build/test aggregates (host)
# ============================================================================

[tasks."plugins:build"]
description = "Build all nushell plugin binaries (push, email, cedar)"
depends = ["push:plugin:build", "email:plugin:build", "cedar:plugin:build"]

[tasks."plugins:test"]
description = "Unit-test all nushell plugins"
depends = ["push:plugin:test", "email:plugin:test"]

[tasks."cedar:plugin:build"]
description = "Build the nu_plugin_cedar binary used by ex:cedar-admin"
sources = ["crates/nu_plugin_cedar/**/*.rs", "crates/nu_plugin_cedar/Cargo.toml"]
outputs = ["target/debug/nu_plugin_cedar"]
run = "cargo build -p nu_plugin_cedar"

[tasks."cf:fs:build"]
description = "Build the cloudflare-shell-rpc Worker (wasm + custom shim). Set CF_BUILD_MODE=release for an optimised build (~30s, what cf:fs:deploy uses); default is dev (~5-10s incremental)."
dir = "{{config_root}}/crates/cloudflare-shell-rpc/server"
tools = { "cargo:worker-build" = "^0.8" }
run = '''
#!/usr/bin/env nu
let mode = ($env.CF_BUILD_MODE? | default "dev")
# CUSTOM_SHIM points worker-build at our hand-written WorkerEntrypoint
# template (see ./shim.js for why -- env injection for RPC methods).
# Absolute path so worker-build resolves it regardless of where it cd's
# internally.
$env.CUSTOM_SHIM = ((pwd) | path join "shim.js")
print $"building cloudflare-shell-rpc (mode: ($mode))"
match $mode {
  "dev" => { ^worker-build --dev }
  "release" => { ^worker-build --release }
  _ => { error make {msg: $"CF_BUILD_MODE=($mode) invalid \(use 'dev' or 'release'\)"} }
}
let wasm = (glob "build/**/*.wasm" | where {|p| ($p | path type) == "file" } | first)
if ($wasm | is-not-empty) {
  let size = (^du -h $wasm | str trim | split row "\t" | first)
  print $"built  ($wasm) \(($size)\)"
}
'''

[tasks."cf:fs:dev"]
description = "Run cloudflare-shell-rpc locally via wrangler dev. Health check: curl http://127.0.0.1:8788/. RPC methods are only reachable via a service binding -- see cf:fs:demo:* tasks."
depends = ["cf:fs:build"]
dir = "{{config_root}}/crates/cloudflare-shell-rpc/server"
tools = { "npm:wrangler" = "4.90", node = "22" }
run = "wrangler dev --port 8788"

[tasks."cf:fs:deploy"]
description = "Deploy cloudflare-shell-rpc to Cloudflare (requires CLOUDFLARE_API_TOKEN; pulls from fnox). Forces release-mode build."
depends = ["cf:token-check"]
dir = "{{config_root}}/crates/cloudflare-shell-rpc/server"
tools = { "npm:wrangler" = "4.90", node = "22" }
run = '''
#!/usr/bin/env nu
$env.CLOUDFLARE_API_TOKEN = ($env.CLOUDFLARE_API_TOKEN? | default (^fnox get CLOUDFLARE_API_TOKEN | str trim))
$env.CF_BUILD_MODE = "release"
^mise run cf:fs:build
^wrangler deploy
'''

[tasks."cf:fs:tail"]
description = "Live-tail logs from the deployed cloudflare-shell-rpc Worker."
depends = ["cf:token-check"]
dir = "{{config_root}}/crates/cloudflare-shell-rpc/server"
tools = { "npm:wrangler" = "4.90", node = "22" }
run = '''
#!/usr/bin/env nu
$env.CLOUDFLARE_API_TOKEN = ($env.CLOUDFLARE_API_TOKEN? | default (^fnox get CLOUDFLARE_API_TOKEN | str trim))
^wrangler tail
'''

# --- demo-js: JS Worker that consumes the FS-RPC binding --------------

[tasks."cf:fs:demo:dev"]
description = "Run the cloudflare-shell-rpc JS demo client locally via wrangler dev on :8789. The server (cf:fs:dev on :8788) must be running too -- service bindings resolve cross-process via wrangler's local dev registry. Smoke-test via cf:fs:smoke."
dir = "{{config_root}}/crates/cloudflare-shell-rpc/demo-js"
tools = { "npm:wrangler" = "4.90", node = "22" }
run = "wrangler dev --port 8789"

[tasks."cf:fs:demo:deploy"]
description = "Deploy the cloudflare-shell-rpc JS demo client. Requires the server to be deployed first (service binding resolution)."
depends = ["cf:token-check"]
dir = "{{config_root}}/crates/cloudflare-shell-rpc/demo-js"
tools = { "npm:wrangler" = "4.90", node = "22" }
run = '''
#!/usr/bin/env nu
$env.CLOUDFLARE_API_TOKEN = ($env.CLOUDFLARE_API_TOKEN? | default (^fnox get CLOUDFLARE_API_TOKEN | str trim))
^wrangler deploy
'''

# --- demo-rust: Rust Worker that consumes the FS-RPC binding ----------

[tasks."cf:fs:demo:rust:build"]
description = "Build the cloudflare-shell-rpc Rust demo Worker (uses worker-build's default shim -- no env-injection workaround needed on the consumer side). CF_BUILD_MODE=release for prod, default is dev."
dir = "{{config_root}}/crates/cloudflare-shell-rpc/demo-rust"
tools = { "cargo:worker-build" = "^0.8" }
run = '''
#!/usr/bin/env nu
let mode = ($env.CF_BUILD_MODE? | default "dev")
print $"building cloudflare-shell-rpc-demo-rust (mode: ($mode))"
match $mode {
  "dev" => { ^worker-build --dev }
  "release" => { ^worker-build --release }
  _ => { error make {msg: $"CF_BUILD_MODE=($mode) invalid"} }
}
let wasm = (glob "build/**/*.wasm" | where {|p| ($p | path type) == "file" } | first)
if ($wasm | is-not-empty) {
  let size = (^du -h $wasm | str trim | split row "\t" | first)
  print $"built  ($wasm) \(($size)\)"
}
'''

[tasks."cf:fs:demo:rust:dev"]
description = "Run the cloudflare-shell-rpc Rust demo Worker locally via wrangler dev on :8790. Server (cf:fs:dev :8788) must be running for service binding to resolve. Smoke-test via cf:fs:smoke:rust."
depends = ["cf:fs:demo:rust:build"]
dir = "{{config_root}}/crates/cloudflare-shell-rpc/demo-rust"
tools = { "npm:wrangler" = "4.90", node = "22" }
run = "wrangler dev --port 8790"

[tasks."cf:fs:demo:rust:deploy"]
description = "Deploy the Rust demo Worker. Server must be deployed first."
depends = ["cf:token-check"]
dir = "{{config_root}}/crates/cloudflare-shell-rpc/demo-rust"
tools = { "npm:wrangler" = "4.90", node = "22" }
run = '''
#!/usr/bin/env nu
$env.CLOUDFLARE_API_TOKEN = ($env.CLOUDFLARE_API_TOKEN? | default (^fnox get CLOUDFLARE_API_TOKEN | str trim))
$env.CF_BUILD_MODE = "release"
^mise run cf:fs:demo:rust:build
^wrangler deploy
'''

# --- full-stack remote lifecycle: deploy + secrets + smoke + teardown -

[tasks."cf:fs:deploy:all"]
description = "Deploy all three Workers (server, demo-js, demo-rust) in dependency order, then push SHELL_FS_TOKEN to each as a wrangler secret if it's in fnox. Idempotent: re-running redeploys + refreshes secrets. The deploy order (server first, then demos, then secret-push to demos before server) avoids any window where consumers can't auth."
depends = ["cf:token-check"]
dir = "{{config_root}}"
tools = { "npm:wrangler" = "4.90", node = "22" }
run = '''
#!/usr/bin/env nu
print "--- 1/3 deploying server ---"
^mise run cf:fs:deploy
print "--- 2/3 deploying demo-js ---"
^mise run cf:fs:demo:deploy
print "--- 3/3 deploying demo-rust ---"
^mise run cf:fs:demo:rust:deploy

let token = (do -i { ^fnox get SHELL_FS_TOKEN } | complete | get stdout | str trim)
if ($token | is-empty) {
  print ""
  print "no SHELL_FS_TOKEN in fnox -- skipping secret push."
  print "  generate one:  let token = (openssl rand -hex 24); $token | fnox set SHELL_FS_TOKEN"
  print "  then re-run:   mise run cf:fs:deploy:all"
  return
}
$env.CLOUDFLARE_API_TOKEN = ($env.CLOUDFLARE_API_TOKEN? | default (^fnox get CLOUDFLARE_API_TOKEN | str trim))
print "--- pushing SHELL_FS_TOKEN to demo-js (consumers first) ---"
do { cd crates/cloudflare-shell-rpc/demo-js; $token | ^wrangler secret put SHELL_FS_TOKEN | ^tail -3 }
print "--- pushing SHELL_FS_TOKEN to demo-rust ---"
do { cd crates/cloudflare-shell-rpc/demo-rust; $token | ^wrangler secret put SHELL_FS_TOKEN | ^tail -3 }
print "--- pushing SHELL_FS_TOKEN to server (closes auth last) ---"
do { cd crates/cloudflare-shell-rpc/server; $token | ^wrangler secret put SHELL_FS_TOKEN | ^tail -3 }
print ""
print "deployed + secured. URLs:"
print "  server   : https://cloudflare-shell-rpc.gedw99.workers.dev"
print "  demo-js  : https://cloudflare-shell-rpc-demo-js.gedw99.workers.dev"
print "  demo-rust: https://cloudflare-shell-rpc-demo-rust.gedw99.workers.dev"
'''

[tasks."cf:fs:smoke:remote"]
description = "Smoke all three deployed Workers in turn (server-direct, demo-js, demo-rust). Pulls SHELL_FS_TOKEN from fnox if present so the server-direct call carries Authorization: Bearer."
dir = "{{config_root}}"
tools = {  }
run = '''
#!/usr/bin/env nu
$env.SHELL_FS_TOKEN = (do -i { ^fnox get SHELL_FS_TOKEN } | complete | get stdout | str trim)
print "--- smoke server direct ---"
$env.LIVE_BASE = "https://cloudflare-shell-rpc.gedw99.workers.dev"
^mise run cf:fs:smoke:server
print "--- smoke demo-js ---"
$env.LIVE_BASE = "https://cloudflare-shell-rpc-demo-js.gedw99.workers.dev"
^mise run cf:fs:smoke
print "--- smoke demo-rust ---"
$env.LIVE_BASE = "https://cloudflare-shell-rpc-demo-rust.gedw99.workers.dev"
^mise run cf:fs:smoke:rust
print "remote smoke all green"
'''

[tasks."cf:fs:teardown"]
description = "Tear down the three deployed Workers (wrangler delete) -- DESTRUCTIVE. Removes the Worker code + bindings. R2 bucket data + DO SQLite contents survive (delete the bucket manually if you want a full wipe)."
depends = ["cf:token-check"]
confirm = "Delete deployed Workers cloudflare-shell-rpc + demo-js + demo-rust? Worker code goes; R2 bucket data + DO contents survive."
dir = "{{config_root}}"
tools = { "npm:wrangler" = "4.90", node = "22" }
run = '''
#!/usr/bin/env nu
$env.CLOUDFLARE_API_TOKEN = ($env.CLOUDFLARE_API_TOKEN? | default (^fnox get CLOUDFLARE_API_TOKEN | str trim))
print "--- deleting demo-rust (consumer first) ---"
do -i { cd crates/cloudflare-shell-rpc/demo-rust; ^wrangler delete --force }
print "--- deleting demo-js ---"
do -i { cd crates/cloudflare-shell-rpc/demo-js; ^wrangler delete --force }
print "--- deleting server (last) ---"
do -i { cd crates/cloudflare-shell-rpc/server; ^wrangler delete --force }
print ""
print "Workers deleted. R2 bucket cloudflare-shell-rpc-files preserved -- delete via:"
print "  wrangler r2 bucket delete cloudflare-shell-rpc-files --force"
'''

[tasks."cf:fs:smoke:rust"]
description = "End-to-end smoke test for cloudflare-shell-rpc-client via the Rust demo Worker. Same sequence as cf:fs:smoke but hits :8790 by default. LIVE_BASE=https://... overrides."
dir = "{{config_root}}"
run = 'nu crates/cloudflare-shell-rpc/smoke/run.nu --url "${LIVE_BASE:-http://127.0.0.1:8790}"'

[tasks."cf:fs:smoke:server"]
description = "End-to-end smoke test against the server's direct HTTP routes (:8788), no service binding involved. If the server has SHELL_FS_TOKEN set, export it locally (or pull from fnox) before running."
dir = "{{config_root}}"
run = '''
#!/usr/bin/env nu
let url = ($env.LIVE_BASE? | default "http://127.0.0.1:8788")
let auth = ($env.SHELL_FS_TOKEN? | default "")
^nu crates/cloudflare-shell-rpc/smoke/run.nu --url $url --auth $auth
'''

# --- pitchfork: bring up / tear down all three FS Workers together ----
#
# Daemon definitions live in crates/cloudflare-shell-rpc/pitchfork.toml.
# Pinned to v2.10.0 (fixes over the older jdx-namespaced 2.2.0).

[tasks."cf:fs:up"]
description = "Bring up the FS-RPC server + JS demo + Rust demo via pitchfork. Each daemon has an HTTP readiness probe; this task returns only after all three answer. Open http://127.0.0.1:8789 for the JS demo banner, :8790 for Rust."
dir = "{{config_root}}/crates/cloudflare-shell-rpc"
tools = { "github:endevco/pitchfork" = "v2.10.0" }
run = "pitchfork start -l"

[tasks."cf:fs:down"]
description = "Stop all FS-RPC daemons started by cf:fs:up."
dir = "{{config_root}}/crates/cloudflare-shell-rpc"
tools = { "github:endevco/pitchfork" = "v2.10.0" }
run = '''
#!/usr/bin/env nu
do -i { ^pitchfork stop cf-fs-demo-js }
do -i { ^pitchfork stop cf-fs-demo-rust }
do -i { ^pitchfork stop cf-fs-server }
'''

[tasks."cf:fs:status"]
description = "Show pitchfork status for the FS-RPC daemons."
dir = "{{config_root}}/crates/cloudflare-shell-rpc"
tools = { "github:endevco/pitchfork" = "v2.10.0" }
run = "pitchfork list"

[tasks."cf:fs:logs"]
description = "Tail logs for a FS-RPC daemon. WHICH=server|demo-js|demo-rust (default: server)."
dir = "{{config_root}}/crates/cloudflare-shell-rpc"
tools = { "github:endevco/pitchfork" = "v2.10.0" }
run = '''
#!/usr/bin/env nu
let which = ($env.WHICH? | default "server")
^pitchfork logs $"cf-fs-($which)"
'''

[tasks."cf:fs:smoke:all"]
description = "Full end-to-end: bring up server + both demos via pitchfork, run cf:fs:smoke (JS) and cf:fs:smoke:rust, then bring everything down. Use to verify the whole subsystem in one command."
dir = "{{config_root}}/crates/cloudflare-shell-rpc"
tools = { "github:endevco/pitchfork" = "v2.10.0" }
run = '''
#!/usr/bin/env nu
^mise run cf:fs:up
let result = (try {
  print "--- smoke server direct (no binding) ---"
  ^mise run cf:fs:smoke:server
  print "--- smoke JS demo ---"
  ^mise run cf:fs:smoke
  print "--- smoke Rust demo ---"
  ^mise run cf:fs:smoke:rust
  {ok: true, err: null}
} catch {|e| {ok: false, err: $e.msg} })
do -i { ^mise run cf:fs:down }
if $result.ok {
  print "cf:fs:smoke:all passed"
} else {
  error make {msg: $result.err}
}
'''

# --- bench-fs-rpc: oha benchmarks against the demo Workers ------------
#
# Same shape as cf:bench:* but parameterised by both demos so the
# REPORT.md shows a JS-vs-Rust spread for each path. Workers must be
# up (cf:fs:up) before benching local.

[tasks."cf:fs:bench:local"]
description = "Benchmark cloudflare-shell-rpc locally via both demos. Hits :8789 (JS) and :8790 (Rust) on a fixed path matrix and appends rows to results.nuon. Requires `mise run cf:fs:up` first. Override DURATION / CONNECTIONS / SEED_SIZE env."
dir = "{{config_root}}"
tools = { "cargo:oha" = "1.10" }
run = '''
#!/usr/bin/env nu
let duration = ($env.DURATION? | default "10s")
let connections = ($env.CONNECTIONS? | default "50")
let seed_size = ($env.SEED_SIZE? | default "1024")
^nu crates/cloudflare-shell-rpc/bench/matrix.nu --url-js http://127.0.0.1:8789 --url-rust http://127.0.0.1:8790 --duration $duration --connections $connections --seed-size $seed_size
'''

[tasks."cf:fs:bench:remote"]
description = "Benchmark cloudflare-shell-rpc on deployed Workers. Override LIVE_BASE_{SERVER,JS,RUST} (defaults assume the gedw99.workers.dev subdomain). If the server has SHELL_FS_TOKEN set, export it locally so server-direct rows pass auth."
dir = "{{config_root}}"
tools = { "cargo:oha" = "1.10" }
run = '''
#!/usr/bin/env nu
let url_server = ($env.LIVE_BASE_SERVER? | default "https://cloudflare-shell-rpc.gedw99.workers.dev")
let url_js = ($env.LIVE_BASE_JS? | default "https://cloudflare-shell-rpc-demo-js.gedw99.workers.dev")
let url_rust = ($env.LIVE_BASE_RUST? | default "https://cloudflare-shell-rpc-demo-rust.gedw99.workers.dev")
let duration = ($env.DURATION? | default "10s")
let connections = ($env.CONNECTIONS? | default "50")
let seed_size = ($env.SEED_SIZE? | default "1024")
let auth_server = ($env.SHELL_FS_TOKEN? | default "")
^nu crates/cloudflare-shell-rpc/bench/matrix.nu --url-server $url_server --url-js $url_js --url-rust $url_rust --duration $duration --connections $connections --seed-size $seed_size --auth-server $auth_server --tag " (remote)"
'''

[tasks."cf:fs:bench:report"]
description = "Regenerate crates/cloudflare-shell-rpc/bench/REPORT.local.md + REPORT.remote.md from results.nuon. Splits rows by target (localhost vs deployed) so production + dev numbers stop sharing a file. Embeds the latest Deployment sizes from sizes.nuon in both."
dir = "{{config_root}}"
run = "nu crates/cloudflare-shell-rpc/bench/report.nu --save"

[tasks."cf:fs:bench:sizes"]
description = "Measure deployed bundle sizes (raw + gzip-9) for server / demo-js / demo-rust via `wrangler deploy --dry-run`. Appends to sizes.nuon; run cf:fs:bench:report to render the size table into both REPORT.local.md and REPORT.remote.md. No Workers need to be running; this only touches the build pipeline."
dir = "{{config_root}}"
tools = { "npm:wrangler" = "4.90", node = "22", "cargo:worker-build" = "^0.8" }
run = "nu crates/cloudflare-shell-rpc/bench/sizes.nu --save"

[tasks."cf:fs:bench:all"]
description = "Full bench pipeline: bring up Workers via pitchfork, run cf:fs:bench:local, regenerate REPORT.md, tear down."
dir = "{{config_root}}"
tools = { "cargo:oha" = "1.10" }
run = '''
#!/usr/bin/env nu
^mise run cf:fs:up
let result = (try {
  ^mise run cf:fs:bench:local
  ^mise run cf:fs:bench:report
  {ok: true, err: null}
} catch {|e| {ok: false, err: $e.msg} })
do -i { ^mise run cf:fs:down }
if not $result.ok {
  error make {msg: $result.err}
}
'''

[tasks."cf:fs:smoke"]
description = "End-to-end smoke test for cloudflare-shell-rpc via the JS demo client. Round-trips PUT/GET/stat/list/mkdir/rm/404 + bad-namespace rejection. Defaults to http://127.0.0.1:8789 (local); set LIVE_BASE=https://... to hit a deployed demo."
dir = "{{config_root}}"
run = 'nu crates/cloudflare-shell-rpc/smoke/run.nu --url "${LIVE_BASE:-http://127.0.0.1:8789}"'


# ============================================================================
# examples on Cloudflare (mirrors ex:* but on wasm Workers)
# ============================================================================
# Each ex:cf:<name> inline-exports CF_HANDLER_PATH and shells out to
# `mise run cf:dev`. (We used to use `env = {...} + depends = ["cf:dev"]`
# but mise's task-table env doesn't propagate to depended-on tasks --
# every demo silently built the default handler. The inline-export form
# works because shell env DOES propagate into the subprocess + its deps.)
# CLOUDFLARE_STATUS.md's "Example status" table tracks which demos work.

[tasks."push:plugin:build"]
description = "Build the nu_plugin_push binary"
sources = ["crates/nu_plugin_push/src/**/*.rs", "crates/nu_plugin_push/Cargo.toml"]
outputs = ["target/debug/nu_plugin_push"]
run = "cargo build -p nu_plugin_push"

[tasks."push:plugin:test"]
description = "Run unit tests for nu_plugin_push"
run = "cargo test -p nu_plugin_push"

# ============================================================================
# VAPID keypair management (fnox-backed)
# ============================================================================

[tasks."email:plugin:build"]
description = "Build the nu_plugin_email binary"
sources = ["crates/nu_plugin_email/src/**/*.rs", "crates/nu_plugin_email/Cargo.toml"]
outputs = ["target/debug/nu_plugin_email"]
run = "cargo build -p nu_plugin_email"

[tasks."email:plugin:test"]
description = "Run unit tests for nu_plugin_email"
run = "cargo test -p nu_plugin_email"

# ============================================================================
# Worker build / dev / deploy / tail. All routed through `fnox exec` so
# wrangler sees CLOUDFLARE_API_TOKEN and the Worker sees its runtime secrets.
# ============================================================================

[tasks."email:worker:check"]
description = "Type-check cf_email_worker against wasm32-unknown-unknown (fast, no deploy)"
sources = ["crates/cf_email_worker/src/**/*.rs", "crates/cf_email_worker/Cargo.toml"]
run = "cargo check -p cf_email_worker --target wasm32-unknown-unknown"

[tasks."email:worker:dev"]
description = "Run cf_email_worker locally. Outbound writes to .eml files; simulate inbound with `curl -X POST localhost:8787/cdn-cgi/handler/email --data-binary @sample.eml`."
run = "cd crates/cf_email_worker && fnox exec -- wrangler dev --local"

[tasks."email:worker:deploy"]
description = "Deploy cf_email_worker to Cloudflare. After first deploy, run email:worker:url-set with the printed URL."
run = "cd crates/cf_email_worker && fnox exec -- wrangler deploy"

[tasks."email:worker:tail"]
description = "Tail logs from the deployed cf_email_worker"
run = "cd crates/cf_email_worker && fnox exec -- wrangler tail"

# ============================================================================
# Secrets generation + worker secret-put. Keychain item names are
# repo-prefixed (HTTP_NU_EMAIL_*) -- see fnox.toml.
# ============================================================================

